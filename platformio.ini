[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Libraries
lib_deps =
  mathieucarbou/ESP Async WebServer @ ^3.0.6
  mathieucarbou/AsyncTCP @ ^3.3.2

lib_ignore = AsyncTCP_RP2040W

; Upload SPIFFS data folder
board_build.filesystem = spiffs

; Load .env into build flags
extra_scripts = pre:extra_scripts/load_env.py

; Only compile the opener firmware (exclude sensor)
build_src_filter = +<main.cpp>

; Serial monitor speed
monitor_speed = 115200
upload_port = COM4
upload_speed = 115200
monitor_port = COM4

[env:esp32dev-ota]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
  mathieucarbou/ESP Async WebServer @ ^3.0.6
  mathieucarbou/AsyncTCP @ ^3.3.2

lib_ignore = AsyncTCP_RP2040W

board_build.filesystem = spiffs
extra_scripts = pre:extra_scripts/load_env.py
build_src_filter = +<main.cpp>

upload_protocol = espota
upload_port     = garage.local

; ─── Sensor ESP32 (HC-SR04 ultrasonic) ───────────────────────────────────────
[env:sensor]
platform  = espressif32
board     = esp32dev
framework = arduino

extra_scripts = pre:extra_scripts/load_env.py

build_src_filter = +<sensor_main.cpp>

monitor_speed = 115200
upload_port   = COM3
upload_speed  = 460800
monitor_port  = COM3

[env:sensor-ota]
platform  = espressif32
board     = esp32dev
framework = arduino

extra_scripts    = pre:extra_scripts/load_env.py
build_src_filter = +<sensor_main.cpp>

upload_protocol = espota
upload_port     = garage-sensor.local
