[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Libraries
lib_deps =
  ESP Async WebServer
  AsyncTCP
  madhephaestus/ESP32Servo @ ^0.13.0

; Upload SPIFFS data folder
board_build.filesystem = spiffs

; Load .env into build flags
extra_scripts = pre:extra_scripts/load_env.py

; Serial monitor speed
monitor_speed = 115200
